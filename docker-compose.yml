services:
  postgres:
    image: postgres:16-alpine
    container_name: budgetapp-db
    environment:
      POSTGRES_DB: budgetapp
      POSTGRES_USER: budgetapp
      POSTGRES_PASSWORD: budgetapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
